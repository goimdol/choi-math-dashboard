<style>

body{font-family:'Noto Sans KR',sans-serif;background:#F0F4F9;min-height:100vh;}
.hdr{background:#122C59;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}

.tab-btn{padding:14px 20px;font-size:13px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .2s;white-space:nowrap;}
.tab-btn.active{color:#122C59;border-bottom-color:#122C59;}

.btn-primary{background:#122C59;color:#fff;}

.btn-reset{background:#eee;color:#555;}
.btn-reset:hover{background:#ddd;}
.bank-detail{margin-top:12px;font-size:12px;color:#666;padding:10px 14px;background:#F8FAFF;border-radius:8px;display:none;}
.bank-detail span{font-weight:700;}
.month-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#122C59;color:#fff;padding:9px 10px;text-align:center;font-weight:700;white-space:nowrap;font-size:12px;}
th:first-child{text-align:left;min-width:120px;}
td{padding:0;border-bottom:1px solid #EEF2F8;vertical-align:middle;}
td:first-child{padding:8px 10px;font-weight:600;color:#333;background:#F8FAFF;border-right:1px solid #E5EAF2;min-width:120px;}

.row-지출기업 td:first-child{background:#FFF3E0;color:#e06b00;}
.row-지출신한 td:first-child{background:#FFF3E0;color:#1565C0;}
.row-지출합계 td:first-child{background:#FFF0F0;color:#D22832;}
.row-순이익 td:first-child{background:#FFF9C4;color:#7a5200;font-weight:900;}
.row-순이익 td{background:#FFFDE7;}
.row-순이익률 td:first-child{background:#EEF4FF;color:#122C59;}

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC6_EjWngSf_EQuqYP7j_rkC53fZUk6UCs",
  authDomain:"choi-math-memo-1d6e6.firebaseapp.com",

  messagingSenderId:"805131169031",
  appId:"1:805131169031:web:ed09dc28e2ae030f9329a2"
});
const db = firebase.firestore();

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let selectedYear = 2026;
let revenues  = Array(12).fill(0);
let expKB     = Array(12).fill(0); // 기업은행
let expSH     = Array(12).fill(0); // 신한은행
let barChart, pieChart;
let saveTimer = null;

// ── 탭 전환 ──
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel,.iframe-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ── 유틸 ──
function fmt(n){ return n===0?'0원':Math.round(n).toLocaleString('ko-KR')+'원'; }
function fmtS(n){
  if(Math.abs(n)>=100000000) return (n/100000000).toFixed(1)+'억';
  if(Math.abs(n)>=10000) return Math.round(n/10000)+'만';
  return Math.round(n).toLocaleString();
}
function totalExp(i){ return (expKB[i]||0)+(expSH[i]||0); }

// ── 테이블 생성 ──
function buildTable(){
  const thead = document.getElementById('thead-row');
  thead.innerHTML = '<th>구분</th>';
  MONTHS.forEach(m=>{ const th=document.createElement('th'); th.textContent=m; thead.appendChild(th); });
  const thT=document.createElement('th'); thT.textContent='합계'; thead.appendChild(thT);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const rows = [
    {id:'rev',   cls:'row-매출',      label:'💵 수강료 매출', input:true},
    {id:'kb',    cls:'row-지출기업',   label:'🏢 기업은행 지출'},
    {id:'sh',    cls:'row-지출신한',   label:'🏦 신한은행 지출'},
    {id:'exp',   cls:'row-지출합계',   label:'📤 지출 합계'},
    {id:'profit',cls:'row-순이익',     label:'📈 순이익'},
    {id:'rate',  cls:'row-순이익률',   label:'📊 순이익률'},
  ];

  rows.forEach(({id,cls,label,input})=>{
    const tr = document.createElement('tr');
    tr.className = cls;
    const tdL = document.createElement('td'); tdL.textContent=label; tr.appendChild(tdL);
    MONTHS.forEach((_,i)=>{
      const td = document.createElement('td');
      if(input){
        const inp = document.createElement('input');
        inp.type='text'; inp.className='money-input'; inp.id=`rev-${i}`; inp.placeholder='0';
        inp.addEventListener('input',e=>{
          const raw=e.target.value.replace(/[^0-9]/g,'');
          revenues[i]=parseInt(raw)||0;
          e.target.value=raw?parseInt(raw).toLocaleString('ko-KR'):'';
          updateCalc(); scheduleSave();
        });
        td.appendChild(inp);
      } else {
        td.id=`${id}-${i}`; td.className='val-cell '+(id==='exp'||id==='kb'||id==='sh'?'expense':id==='profit'?'profit':id==='rate'?'rate':'');
        td.textContent='—';
      }
      tr.appendChild(td);
    });
    const tdT=document.createElement('td'); tdT.id=`${id}-total`;
    tdT.className='val-cell '+(id==='rev'||id==='profit'?'total':id==='exp'?'total':'rate');
    tdT.textContent='—';
    tr.appendChild(tdT);
    tbody.appendChild(tr);
  });
}

// ── 계산 ──
function updateCalc(){
  let tRev=0,tKB=0,tSH=0,tExp=0,tProfit=0,rSum=0,rCnt=0;
  const revA=[],expA=[],profitA=[];

  MONTHS.forEach((_,i)=>{
    const rev=revenues[i]||0;
    const kb=expKB[i]||0, sh=expSH[i]||0;
    const exp=kb+sh;
    const profit=rev-exp;
    const rate=rev>0?profit/rev*100:null;
    tRev+=rev; tKB+=kb; tSH+=sh; tExp+=exp; tProfit+=profit;
    if(rate!==null){rSum+=rate;rCnt++;}
    revA.push(rev); expA.push(exp); profitA.push(profit);

    const set=(id,val,cls)=>{
      const el=document.getElementById(`${id}-${i}`);
      if(!el)return;
      el.textContent=val;
      if(cls)el.className='val-cell '+cls;
    };
    set('kb', kb?kb.toLocaleString('ko-KR'):'—');
    set('sh', sh?sh.toLocaleString('ko-KR'):'—');
    set('exp', exp?exp.toLocaleString('ko-KR'):'—');
    const pEl=document.getElementById(`profit-${i}`);
    if(pEl){
      pEl.textContent=rev?profit.toLocaleString('ko-KR'):'—';
      pEl.className='val-cell profit'+(profit<0&&rev?' neg':'');
    }
    const rEl=document.getElementById(`rate-${i}`);
    if(rEl) rEl.textContent=rate!==null?rate.toFixed(1)+'%':'—';
  });

  // 합계 셀
  const setT=(id,val,neg)=>{
    const el=document.getElementById(`${id}-total`);
    if(!el)return;
    el.textContent=val;
    if(id==='profit') el.className='val-cell total'+(neg?' neg':'');
  };
  setT('rev', tRev.toLocaleString('ko-KR'));
  setT('kb',  tKB.toLocaleString('ko-KR'));
  setT('sh',  tSH.toLocaleString('ko-KR'));
  setT('exp', tExp.toLocaleString('ko-KR'));
  setT('profit', tProfit.toLocaleString('ko-KR'), tProfit<0);
  const rTEl=document.getElementById('rate-total');
  if(rTEl) rTEl.textContent=rCnt>0?(rSum/rCnt).toFixed(1)+'%':'—';

  // 요약 카드
  document.getElementById('sum-revenue').textContent=fmt(tRev);
  document.getElementById('sum-revenue').className='val '+(tRev>0?'green':'');
  document.getElementById('sum-months').textContent=`입력된 달: ${revenues.filter(r=>r>0).length}개월`;
  document.getElementById('sum-expense').textContent=fmt(tExp);
  document.getElementById('sum-profit').textContent=fmt(tProfit);
  document.getElementById('sum-profit').className='val '+(tProfit>=0?'green':'red');
  document.getElementById('sum-rate').textContent=rCnt>0?(rSum/rCnt).toFixed(1)+'%':'—';

  // 은행별 상세
  if(tKB>0||tSH>0){
    document.getElementById('bank-detail').style.display='block';
    document.getElementById('kb-total').textContent=fmt(tKB);
    document.getElementById('sh-total').textContent=fmt(tSH);
    document.getElementById('combined-total').textContent=fmt(tExp);
  }

  updateCharts(revA,expA,profitA);
}

// ── 차트 ──
function initCharts(){
  barChart=new Chart(document.getElementById('bar-chart').getContext('2d'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[
      {label:'매출',data:Array(12).fill(0),backgroundColor:'rgba(26,122,74,.7)',borderRadius:4},
      {label:'기업은행',data:Array(12).fill(0),backgroundColor:'rgba(224,107,0,.6)',borderRadius:4},
      {label:'신한은행',data:Array(12).fill(0),backgroundColor:'rgba(21,101,192,.6)',borderRadius:4},
      {label:'순이익',data:Array(12).fill(0),backgroundColor:'rgba(18,44,89,.8)',borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Noto Sans KR',size:11}}}},
      scales:{
        x:{ticks:{font:{family:'Noto Sans KR',size:11}}},
        y:{ticks:{callback:v=>fmtS(v),font:{family:'Noto Sans KR',size:10}}}
      }}
  });
  pieChart=new Chart(document.getElementById('pie-chart').getContext('2d'),{
    type:'doughnut',
    data:{labels:['기업은행','신한은행','순이익'],
      datasets:[{data:[0,0,0],backgroundColor:['rgba(224,107,0,.7)','rgba(21,101,192,.7)','rgba(26,122,74,.7)'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{family:'Noto Sans KR',size:12}}}}}
  });
}

function updateCharts(revA,expA,profitA){
  if(!barChart||!pieChart)return;
  barChart.data.datasets[0].data=revA;
  barChart.data.datasets[1].data=expKB.slice();
  barChart.data.datasets[2].data=expSH.slice();
  barChart.data.datasets[3].data=profitA.map(p=>Math.max(0,p));
  barChart.update();
  const tKB=expKB.reduce((a,b)=>a+b,0);
  const tSH=expSH.reduce((a,b)=>a+b,0);
  const tProfit=revA.reduce((a,b)=>a+b,0)-tKB-tSH;
  pieChart.data.datasets[0].data=[Math.max(0,tKB),Math.max(0,tSH),Math.max(0,tProfit)];
  pieChart.update();
}

// ── 엑셀 파싱 (날짜 기준 월별 합산 + 중복제거) ──
function parseExcel(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        // 날짜+금액+적요 기준 중복제거 후 월별 합산
        const seen=new Set();
        const monthly=Array(12).fill(0);
        rows.forEach(row=>{
          // 날짜 컬럼 찾기 (Date 객체 또는 날짜 문자열)
          let dateVal=null, amount=0;
          row.forEach(cell=>{
            if(cell instanceof Date){ dateVal=cell; }
            else if(typeof cell==='string'&&/^\d{4}[-./]\d{1,2}[-./]\d{1,2}/.test(cell)){
              dateVal=new Date(cell.replace(/[./]/g,'-'));
            }
            // 숫자이고 지출처럼 보이는 값 (양수, 1000원 이상)
            if(typeof cell==='number'&&cell>=1000&&!amount){ amount=cell; }
          });
          if(!dateVal||!amount)return;
          const month=dateVal.getMonth(); // 0~11
          if(month<0||month>11)return;
          // 중복키: 날짜+금액+행전체 요약
          const key=`${dateVal.toISOString().slice(0,10)}_${amount}_${row.join('|')}`;
          if(seen.has(key))return;
          seen.add(key);
          monthly[month]+=amount;
        });
        res(monthly);
      }catch(e){rej(e);}
    };
    reader.onerror=rej;
    reader.readAsArrayBuffer(file);
  });
}

// ── 업로드 처리 ──
async function uploadExpenses(){
  const fileKB=document.getElementById('file-kb').files[0];
  const fileSH=document.getElementById('file-sh').files[0];
  if(!fileKB&&!fileSH){ alert('파일을 선택해주세요.'); return; }

  const btn=document.querySelector('.btn-primary');
  btn.textContent='처리 중...'; btn.disabled=true;

  try{
    if(fileKB){
      document.getElementById('kb-status').textContent='파싱 중...';
      expKB=await parseExcel(fileKB);
      document.getElementById('kb-status').textContent=`✅ 완료 (${expKB.filter(v=>v>0).length}개월)`;
      document.getElementById('kb-status').style.color='#1a7a4a';
    }
    if(fileSH){
      document.getElementById('sh-status').textContent='파싱 중...';
      expSH=await parseExcel(fileSH);
      document.getElementById('sh-status').textContent=`✅ 완료 (${expSH.filter(v=>v>0).length}개월)`;
      document.getElementById('sh-status').style.color='#1a7a4a';
    }

    // Firebase 저장 (은행별 분리 저장)
    await db.collection('accounting').doc(`${selectedYear}-expenses`).set({
      year:selectedYear,
      expKB:expKB, expSH:expSH,
      // 하위 호환: expenses = 합산
      expenses:expKB.map((v,i)=>v+(expSH[i]||0)),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    updateCalc();
    alert('✅ 저장 완료! 기업+신한 합산이 반영됐습니다.');
  }catch(e){
    console.error(e);
    alert('오류가 발생했습니다. 파일 형식을 확인해주세요.');
  } finally {
    btn.textContent='📤 합산 저장'; btn.disabled=false;
  }
}

async function resetExpenses(){
  if(!confirm('지출 데이터를 초기화할까요?'))return;
  expKB=Array(12).fill(0); expSH=Array(12).fill(0);
  await db.collection('accounting').doc(`${selectedYear}-expenses`).set({
    year:selectedYear, expKB:expKB, expSH:expSH, expenses:Array(12).fill(0),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById('kb-status').textContent='';
  document.getElementById('sh-status').textContent='';
  document.getElementById('bank-detail').style.display='none';
  document.getElementById('file-kb').value='';
  document.getElementById('file-sh').value='';
  updateCalc();
}

// ── Firebase 저장/로드 ──
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    db.collection('accounting').doc(`${selectedYear}-revenues`).set({
      year:selectedYear, revenues:revenues,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(e=>console.warn(e));
  },1200);
}

async function loadData(){
  revenues=Array(12).fill(0); expKB=Array(12).fill(0); expSH=Array(12).fill(0);
  try{
    const doc=await db.collection('accounting').doc(`${selectedYear}-revenues`).get();
    if(doc.exists&&doc.data().revenues){
      revenues=doc.data().revenues;
      revenues.forEach((v,i)=>{
        const inp=document.getElementById(`rev-${i}`);
        if(inp) inp.value=v?v.toLocaleString('ko-KR'):'';
      });
    }
  }catch(e){}
  try{
    const doc=await db.collection('accounting').doc(`${selectedYear}-expenses`).get();
    if(doc.exists){
      const d=doc.data();
      expKB=d.expKB||Array(12).fill(0);
      expSH=d.expSH||Array(12).fill(0);
      const hasData=expKB.some(v=>v>0)||expSH.some(v=>v>0);
      if(hasData){
        document.getElementById('kb-status').textContent=`✅ 저장됨 (${expKB.filter(v=>v>0).length}개월)`;
        document.getElementById('kb-status').style.color='#1a7a4a';
        document.getElementById('sh-status').textContent=`✅ 저장됨 (${expSH.filter(v=>v>0).length}개월)`;
        document.getElementById('sh-status').style.color='#1a7a4a';
      }
    }
  }catch(e){}
  updateCalc();
}

document.getElementById('year-select').addEventListener('change',e=>{
  selectedYear=parseInt(e.target.value);
  document.getElementById('kb-status').textContent='';
  document.getElementById('sh-status').textContent='';
  document.getElementById('bank-detail').style.display='none';
  buildTable(); loadData();
});

buildTable();
initCharts();
loadData();
</script>
